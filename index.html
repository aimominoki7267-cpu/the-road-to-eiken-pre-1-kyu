<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>英検準1級 語彙トレーニング</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500;600&family=Noto+Sans+JP:wght@400;500&display=swap');

    :root {
      --bg: #F7F4EF;
      --surface: #FFFFFF;
      --surface2: #F2EEE8;
      --border: #DDD8CF;
      --border-light: #EAE6DF;
      --text: #1C1A17;
      --text2: #5A5347;
      --text3: #8C8279;
      --gold: #8B6020;
      --gold-light: #C8972A;
      --gold-bg: #FBF5E8;
      --indigo: #2B4085;
      --indigo-light: #3D56A8;
      --indigo-bg: #EEF1FA;
      --green: #2A6B40;
      --green-bg: #EAF5EE;
      --red: #8B2020;
      --red-bg: #FAF0EE;
      --amber: #8B5000;
      --amber-bg: #FDF3E0;
    }

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }

    .app {
      width: 100%;
      max-width: 520px;
      min-height: 100vh;
      padding-bottom: 48px;
      position: relative;
    }

    /* ── Header ── */
    .header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
    }
    .header-left {}
    .header-eyebrow {
      font-size: 9px;
      letter-spacing: 0.22em;
      color: var(--gold);
      text-transform: uppercase;
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 500;
      margin-bottom: 3px;
    }
    .header-title {
      font-family: 'Noto Serif JP', serif;
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.03em;
    }
    input[type="date"] {
      font-family: 'Noto Serif JP', serif;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text2);
      padding: 6px 10px;
      font-size: 12px;
      outline: none;
    }

    /* ── Day info ── */
    .day-info {
      padding: 12px 24px 0;
      background: var(--surface);
    }
    .day-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .day-badge {
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 12px;
      font-weight: 500;
      color: var(--indigo);
      background: var(--indigo-bg);
      border: 1px solid #C0CAED;
      padding: 2px 12px;
      border-radius: 3px;
      letter-spacing: 0.05em;
    }
    .mode-badge {
      font-size: 10px;
      letter-spacing: 0.1em;
      padding: 2px 10px;
      border-radius: 3px;
      text-transform: uppercase;
      font-family: 'Noto Sans JP', sans-serif;
    }
    .mode-study { background: var(--gold-bg); color: var(--gold); border: 1px solid #DEC080; }
    .mode-quiz  { background: var(--indigo-bg); color: var(--indigo); border: 1px solid #C0CAED; }
    .word-range { font-size: 11px; color: var(--text3); letter-spacing: 0.02em; }
    .counter    { margin-left: auto; font-size: 11px; color: var(--text3); font-variant-numeric: tabular-nums; }
    .progress-track { height: 2px; background: var(--border); overflow: hidden; }
    .progress-fill  { height: 100%; transition: width .5s ease; background: var(--gold-light); }

    /* ── Main ── */
    .main { padding: 20px 24px 0; }

    /* ── Mode select ── */
    .mode-select { padding: 4px 0; }
    .mode-select-title {
      font-family: 'Noto Serif JP', serif;
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
      text-align: center;
      margin-bottom: 6px;
      letter-spacing: 0.03em;
    }
    .countdown-badge {
      display: inline-flex;
      align-items: baseline;
      gap: 5px;
      background: var(--gold-bg);
      border: 1px solid #DEC080;
      border-radius: 4px;
      padding: 5px 16px;
      margin: 0 auto 8px;
    }
    .countdown-num {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--gold);
      line-height: 1;
    }
    .countdown-label {
      font-size: 12px;
      color: var(--text2);
      letter-spacing: 0.05em;
    }
    .mode-select-sub {
      font-size: 11px;
      color: var(--text3);
      text-align: center;
      margin-bottom: 24px;
      letter-spacing: 0.05em;
    }
    .mode-btn {
      display: flex;
      align-items: center;
      gap: 16px;
      width: 100%;
      padding: 18px 20px;
      border-radius: 8px;
      border: 1px solid var(--border);
      cursor: pointer;
      font-family: inherit;
      text-align: left;
      margin-bottom: 12px;
      transition: all .15s;
      background: var(--surface);
    }
    .mode-btn:hover { background: var(--surface2); border-color: var(--text3); }
    .mode-btn-icon { font-size: 22px; flex-shrink: 0; width: 32px; text-align: center; }
    .mode-btn-label {
      font-family: 'Noto Serif JP', serif;
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 3px;
      letter-spacing: 0.03em;
    }
    .mode-btn-desc { font-size: 11px; color: var(--text3); line-height: 1.5; }
    .mode-btn-stats { border-color: #C0CAED; background: var(--indigo-bg); }
    .mode-btn-stats:hover { background: #DDE2F5; }
    .mode-btn-stats .mode-btn-label { color: var(--indigo); }

    /* ── Word card ── */
    .word-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 28px 24px 20px;
      margin-bottom: 14px;
      position: relative;
    }
    .word-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 3px; height: 100%;
      background: var(--gold-light);
      border-radius: 8px 0 0 8px;
    }
    .word-meta {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 14px;
    }
    .word-num {
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 11px;
      color: var(--text3);
      letter-spacing: 0.05em;
    }
    .pos-badge {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 3px;
      letter-spacing: 0.05em;
      border: 1px solid var(--border);
      color: var(--text2);
      background: var(--bg);
    }
    .word-en {
      font-family: Georgia, 'Times New Roman', 'Yu Mincho', serif;
      font-size: 48px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0em;
      line-height: 1.1;
      margin-bottom: 6px;
    }
    .word-ja {
      font-family: 'Noto Serif JP', 'Hiragino Mincho ProN', 'Yu Mincho', serif;
      font-size: 18px;
      font-weight: 400;
      color: var(--text2);
      margin-bottom: 18px;
      letter-spacing: 0.05em;
      line-height: 1.6;
    }

    /* Example box */
    .example-box {
      background: var(--bg);
      border: 1px solid var(--border-light);
      border-radius: 6px;
      padding: 14px 16px;
      margin-bottom: 14px;
    }
    .ex-en {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 16px;
      color: var(--text);
      line-height: 1.85;
      margin-bottom: 8px;
      font-style: normal;
      font-weight: 400;
      letter-spacing: 0.01em;
    }
    .ex-blank {
      font-style: normal;
      font-weight: 700;
      color: var(--indigo);
      border-bottom: 1.5px solid var(--indigo);
      padding: 0 4px;
    }
    .ex-ja {
      font-family: 'Noto Serif JP', 'Hiragino Mincho ProN', serif;
      font-size: 13px;
      color: var(--text3);
      line-height: 1.75;
    }

    /* Etymology & family */
    .etymology-box {
      border: 1px solid var(--gold-bg);
      background: var(--gold-bg);
      border-radius: 6px;
      padding: 12px 16px;
      margin-bottom: 10px;
    }
    .etymology-label {
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 9px;
      letter-spacing: 0.18em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 5px;
    }
    .etymology-text {
      font-family: 'Noto Serif JP', 'Hiragino Mincho ProN', serif;
      font-size: 13px;
      color: var(--text2);
      line-height: 1.8;
    }
    .family-box {
      background: var(--surface2);
      border: 1px solid var(--border-light);
      border-radius: 6px;
      padding: 10px 16px;
    }
    .family-label {
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 9px;
      letter-spacing: 0.18em;
      color: var(--text3);
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .family-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .family-tag {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 14px;
      color: var(--indigo);
      background: var(--indigo-bg);
      border: 1px solid #C0CAED;
      padding: 3px 12px;
      border-radius: 3px;
      letter-spacing: 0.02em;
    }

    /* Quiz card */
    .quiz-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 24px 22px;
      margin-bottom: 14px;
    }
    .quiz-review-badge {
      display: inline-block;
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--indigo);
      background: var(--indigo-bg);
      border: 1px solid #C0CAED;
      padding: 2px 8px;
      border-radius: 3px;
      margin-bottom: 12px;
    }
    .quiz-sentence {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 17px;
      font-style: normal;
      color: var(--text);
      line-height: 1.9;
      margin-bottom: 6px;
      letter-spacing: 0.01em;
    }
    .quiz-blank-slot {
      display: inline-block;
      min-width: 80px;
      border-bottom: 2px solid var(--gold-light);
      color: var(--gold);
      font-weight: 600;
      font-style: normal;
      text-align: center;
      padding: 0 4px;
    }
    .quiz-ja {
      font-size: 11px;
      color: var(--text3);
      margin-bottom: 20px;
      line-height: 1.6;
    }
    .choices {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .choice-btn {
      padding: 14px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 16px;
      font-weight: 400;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: all .15s;
      text-align: center;
      min-height: 52px;
    }
    .choice-btn:hover:not(:disabled) { background: var(--surface2); border-color: var(--text3); }
    .choice-btn.correct  { background: var(--green-bg)!important; border-color: #70B890!important; color: var(--green)!important; }
    .choice-btn.wrong    { background: var(--red-bg)!important; border-color: #C08080!important; color: var(--red)!important; }
    .choice-btn.show-correct { background: var(--green-bg)!important; border-color: #70B890!important; color: var(--green)!important; }
    .choice-btn:disabled { cursor: default; }
    .quiz-result {
      font-size: 13px;
      font-weight: 500;
      margin-top: 14px;
      padding: 10px 14px;
      border-radius: 6px;
      display: none;
    }
    .quiz-result.correct { background: var(--green-bg); color: var(--green); border: 1px solid #70B890; display: block; }
    .quiz-result.wrong   { background: var(--red-bg); color: var(--red); border: 1px solid #C08080; display: block; }

    /* Summary */
    .summary-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 24px 22px;
      margin-bottom: 14px;
    }
    .summary-title {
      font-family: 'Noto Serif JP', serif;
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 16px;
      letter-spacing: 0.03em;
    }
    .summary-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 10px 0;
      border-bottom: 1px solid var(--border-light);
    }
    .summary-row:last-child { border-bottom: none; }
    .summary-label { font-size: 12px; color: var(--text2); letter-spacing: 0.03em; }
    .summary-val { font-family: Georgia, 'Times New Roman', serif; font-size: 22px; font-weight: 700; }
    .val-good { color: var(--green); }
    .val-warn { color: var(--amber); }
    .val-bad  { color: var(--red); }
    .weak-list { margin-top: 16px; }
    .weak-section-label {
      font-size: 9px;
      letter-spacing: 0.18em;
      color: var(--text3);
      text-transform: uppercase;
      margin-bottom: 8px;
      font-family: 'Noto Sans JP', sans-serif;
    }
    .weak-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: var(--bg);
      border: 1px solid var(--border-light);
      border-radius: 5px;
      margin-bottom: 6px;
    }
    .weak-word { font-family: Georgia, 'Times New Roman', serif; font-size: 15px; font-weight: 400; color: var(--text); }
    .weak-meaning { font-family: 'Noto Serif JP', serif; font-size: 11px; color: var(--text3); margin-left: 6px; }
    .weak-cnt { font-size: 10px; color: var(--red); background: var(--red-bg); border: 1px solid #C08080; padding: 2px 8px; border-radius: 3px; }

    /* History */
    .hist-section { margin-top: 20px; border-top: 1px solid var(--border-light); padding-top: 16px; }
    .hist-title { font-size: 9px; letter-spacing: 0.18em; color: var(--text3); text-transform: uppercase; margin-bottom: 12px; font-family: 'Noto Sans JP', sans-serif; }
    .hist-chart { display: flex; align-items: flex-end; gap: 5px; height: 72px; margin-bottom: 12px; }
    .hist-bar-wrap { display: flex; flex-direction: column; align-items: center; gap: 3px; flex: 1; min-width: 0; }
    .hist-bar-bg { width: 100%; background: var(--bg); border: 1px solid var(--border-light); border-radius: 3px; overflow: hidden; height: 48px; display: flex; align-items: flex-end; }
    .hist-bar-fill { width: 100%; border-radius: 2px; transition: height .5s ease; min-height: 2px; }
    .hist-bar-pct { font-size: 8px; color: var(--text3); text-align: center; width: 100%; }
    .hist-bar-date { font-size: 8px; color: var(--text3); text-align: center; width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .hist-row { display: flex; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--border-light); }
    .hist-row:last-child { border-bottom: none; }
    .hist-row-date { font-size: 11px; color: var(--text2); flex: 1; }
    .hist-row-day { font-size: 12px; color: var(--text3); width: 44px; text-align: center; }
    .hist-row-bar { flex: 2; height: 4px; background: var(--border-light); border-radius: 2px; overflow: hidden; margin: 0 10px; }
    .hist-row-fill { height: 100%; border-radius: 2px; }
    .hist-row-pct { font-family: Georgia, 'Times New Roman', serif; font-size: 14px; font-weight: 700; width: 38px; text-align: right; }

    /* Stats page */
    .stats-page { padding: 4px 0; }
    .stats-back {
      display: flex; align-items: center; gap: 6px;
      background: none; border: none;
      color: var(--text3); font-size: 12px;
      font-family: 'Noto Serif JP', serif;
      cursor: pointer; padding: 4px 0 20px;
    }
    .stats-back:hover { color: var(--text); }
    .stats-section-title { font-size: 9px; letter-spacing: 0.18em; color: var(--text3); text-transform: uppercase; margin-bottom: 12px; margin-top: 4px; font-family: 'Noto Sans JP', sans-serif; }

    /* Nav */
    .nav { display: flex; gap: 10px; }
    .nav-btn {
      padding: 13px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-family: 'Noto Serif JP', serif;
      font-weight: 400;
      cursor: pointer;
      transition: all .15s;
      letter-spacing: 0.03em;
    }
    .nb-home {
      flex: 0 0 auto;
      padding: 13px 14px;
      background: none;
      border: 1px solid var(--border);
      color: var(--text3);
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
      transition: all .15s;
    }
    .nb-home:hover { background: var(--surface2); color: var(--gold); border-color: var(--text3); }
    .nb-prev:disabled { opacity: 0.35; cursor: default; }
    .nb-prev:not(:disabled):hover { background: var(--surface2); }
    .nb-study { flex: 2; background: var(--indigo); color: #fff; border: none; }
    .nb-study:hover { background: var(--indigo-light); }
    .nb-gold  { flex: 2; background: var(--gold); color: #fff; border: none; }
    .nb-gold:hover { background: var(--gold-light); }
    .nb-quiz  { flex: 2; background: var(--indigo-bg); color: var(--indigo); border: 1px solid #C0CAED; }
    .nb-quiz:hover { background: #DDE2F5; }

    /* misc */
    .center-msg { text-align: center; padding: 48px 20px; }
    .center-icon { font-size: 32px; margin-bottom: 12px; }
    .center-title { font-family: 'Noto Sans JP', sans-serif; font-size: 20px; font-weight: 500; color: var(--text); margin-bottom: 8px; }
    .center-sub { font-size: 12px; color: var(--text3); line-height: 1.9; }
    .hidden { display: none; }
    /* ── Word list ── */
    .wordlist-page { padding: 4px 0; }
    .wordlist-back { display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--text3);font-size:12px;font-family:inherit;cursor:pointer;padding:4px 0 18px;width:100%; }
    .wordlist-back:hover { color:var(--text); }
    .wordlist-header { display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px; }
    .wordlist-title { font-family:'Noto Serif JP',serif;font-size:16px;font-weight:600;color:var(--text); }
    .wordlist-count { font-size:11px;color:var(--text3); }
    .wordlist-item {
      display:flex;align-items:center;gap:12px;
      padding:13px 14px;
      background:var(--surface);
      border:1px solid var(--border-light);
      border-radius:7px;
      margin-bottom:8px;
      cursor:pointer;
      transition:all .15s;
    }
    .wordlist-item:hover { background:var(--surface2);border-color:var(--border); }
    .wordlist-rank { font-size:11px;color:var(--text3);width:22px;text-align:right;flex-shrink:0; }
    .wordlist-word { font-family:Georgia,'Times New Roman',serif;font-size:18px;font-weight:400;color:var(--text);flex:1; }
    .wordlist-meaning { font-family:'Noto Serif JP',serif;font-size:12px;color:var(--text3);flex:1;text-align:right; }
    .wordlist-badge { font-size:10px;border-radius:3px;padding:2px 8px;white-space:nowrap;flex-shrink:0; }
    .badge-weak { background:var(--red-bg);color:var(--red);border:1px solid #C08080; }
    .badge-ok   { background:var(--green-bg);color:var(--green);border:1px solid #70B890; }
    .badge-new  { background:var(--indigo-bg);color:var(--indigo);border:1px solid #C0CAED; }
    .wordlist-empty { font-size:13px;color:var(--text3);text-align:center;padding:32px 0;line-height:1.9; }
  </style>
</head>
<body>
<div class="app">
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="header-eyebrow">Eiken Grade Pre-1</div>
      <div class="header-title">語彙トレーニング</div>
    </div>
    <input type="date" id="dateInput" value="2026-04-20" min="2026-04-20" max="2026-05-30"/>
  </div>
  <!-- Day info -->
  <div class="day-info">
    <div class="day-row">
      <span class="day-badge" id="dayBadge">Day 1</span>
      <span class="mode-badge mode-study" id="modeBadge">Study</span>
      <span class="word-range" id="wordRange">No. 1 — 20</span>
      <span class="counter hidden" id="counter"></span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>

  <div class="main">

    <!-- モード選択 -->
    <div id="modeSelectView" class="hidden">
      <div class="mode-select">
        <div class="mode-select-title" id="modeSelectTitle">Day 1</div>
        <div style="text-align:center;margin-bottom:10px">
          <div class="countdown-badge" id="countdownBadge" style="display:none">
            <span class="countdown-label">試験まで あと</span>
            <span class="countdown-num" id="countdownNum">—</span>
            <span class="countdown-label">日</span>
          </div>
          <div id="examPassedMsg" style="display:none;font-size:12px;color:var(--green);padding:4px 0">✦ 試験日を過ぎました</div>
        </div>
        <div class="mode-select-sub" id="modeSelectSub">どちらから始めますか？</div>
        <button class="mode-btn" onclick="startStudy()">
          <span class="mode-btn-icon">◈</span>
          <div>
            <div class="mode-btn-label">学習モード</div>
            <div class="mode-btn-desc">単語・語源・語族を確認する</div>
          </div>
        </button>
        <button class="mode-btn" onclick="startQuizFromSelect()">
          <span class="mode-btn-icon">◇</span>

const START=new Date("2026-04-20T00:00:00"),PER_DAY=20,MAX_W=1200;
const EXAM_DATE=new Date("2026-05-31T00:00:00");
const SRS_KEY="p1_srs_v1",HIST_KEY="p1_hist_v1";

// ── SRS ──────────────────────────────────────────
function loadSRS(){try{return JSON.parse(localStorage.getItem(SRS_KEY)||"{}")}catch(e){return{}}}
function saveSRS(d){try{localStorage.setItem(SRS_KEY,JSON.stringify(d))}catch(e){}}
function loadHist(){try{return JSON.parse(localStorage.getItem(HIST_KEY)||"[]")}catch(e){return[]}}
function addDays(s,n){const d=new Date(s+"T00:00:00");d.setDate(d.getDate()+n);return d.toISOString().split("T")[0]}
function todayStr(){return new Date().toISOString().split("T")[0]}

function recordResult(n,ok){
  const srs=loadSRS(),rec=srs[n]||{wrong:0,interval:1,nextDate:null};
  if(ok){rec.interval=Math.min(rec.interval*2,30);rec.nextDate=addDays(todayStr(),rec.interval);}
  else{rec.wrong=(rec.wrong||0)+1;rec.interval=Math.max(1,Math.ceil(3/rec.wrong));rec.nextDate=addDays(todayStr(),rec.interval);}
  srs[n]=rec;saveSRS(srs);
}
function getReviewWords(dateStr){
  const srs=loadSRS();
  return Object.entries(srs).filter(([,r])=>r.nextDate&&r.nextDate<=dateStr&&r.wrong>0)
    .map(([n])=>ALL_WORDS.find(w=>w.n===parseInt(n))).filter(Boolean);
}
function saveScore(dateStr,day,correct,total,rate){
  const hist=loadHist(),idx=hist.findIndex(h=>h.date===dateStr);
  const rec={date:dateStr,day,correct,total,rate};
  if(idx>=0){if(rate>=hist[idx].rate)hist[idx]=rec;}else hist.push(rec);
  hist.sort((a,b)=>a.date.localeCompare(b.date));
  try{localStorage.setItem(HIST_KEY,JSON.stringify(hist))}catch(e){}
}
function rateColor(r){return r>=80?"#2A6B40":r>=60?"#8B5000":"#8B2020"}
function rateBg(r){return r>=80?"#EAF5EE":r>=60?"#FDF3E0":"#FAF0EE"}

// ── State ──────────────────────────────────────────
let dayWords=[],wordIdx=0,quizQueue=[],quizIdx=0,qCorrect=0,qWrong=0,curDate="2026-04-20",qAnswered=false;

function dateToDay(s){const d=new Date(s+"T00:00:00");return Math.max(1,Math.floor((d-START)/86400000)+1)}

function showView(id){
  ["modeSelectView","statsView","wordListView","wordCardView","quizCardView","summaryView","noDataView","completeView"]
    .forEach(v=>document.getElementById(v).classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
}

function setMode(m){
  const mb=document.getElementById("modeBadge");
  if(m==="quiz"){mb.textContent="Quiz";mb.className="mode-badge mode-quiz";}
  else{mb.textContent="Study";mb.className="mode-badge mode-study";}
}

function updProgress(cur,tot){
  const pct=tot>0?(cur/tot)*100:0;
  document.getElementById("progressFill").style.width=pct+"%";
  const ct=document.getElementById("counter");ct.textContent=cur+" / "+tot;ct.classList.remove("hidden");
}

// ── Study ──────────────────────────────────────────
function renderWord(){
  const w=dayWords[wordIdx];
  document.getElementById("wordNum").textContent="No. "+w.n;
  document.getElementById("posBadge").textContent=w.pos;
  document.getElementById("wordEn").textContent=w.word;
  document.getElementById("wordJa").textContent=w.meaning;
  // Example: replace ___s / ___d / ___ing etc. all at once with ans
  const ans=w.ans||w.word;
  const exHtml=w.ex_en.replace(/___[a-z]*/g,`<span class="ex-blank">${ans}</span>`);
  document.getElementById("exEn").innerHTML=exHtml;
  document.getElementById("exJa").textContent=w.ex_ja;
  // Etymology
  document.getElementById("etymText").textContent=w.origin||"";
  // Family tags
  const tags=document.getElementById("familyTags");
  tags.innerHTML="";
  (w.family||"").split("，").flatMap(s=>s.split("、")).flatMap(s=>s.split(",")).map(s=>s.trim()).filter(Boolean).forEach(t=>{
    const span=document.createElement("span");span.className="family-tag";span.textContent=t;tags.appendChild(span);
  });
  // Nav
  document.getElementById("prevBtn").disabled=(wordIdx===0);
  const nb=document.getElementById("nextBtn");
  if(wordIdx===dayWords.length-1){nb.textContent="クイズへ進む →";nb.className="nav-btn nb-quiz";}
  else{nb.textContent="次へ →";nb.className="nav-btn nb-gold";}
  updProgress(wordIdx+1,dayWords.length);
  setMode("study");showView("wordCardView");
}

function goNext(){
  if(wordIdx===dayWords.length-1)startQuiz();
  else{wordIdx++;renderWord();}
}
function goPrev(){if(wordIdx>0){wordIdx--;renderWord();}}

// ── Quiz ──────────────────────────────────────────
function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}

function getDistractors(w,n){
  const samePos=ALL_WORDS.filter(x=>x.word!==w.word&&x.pos===w.pos);
  const pool=samePos.length>=n?samePos:ALL_WORDS.filter(x=>x.word!==w.word);
  return shuffle(pool).slice(0,n).map(x=>(x.ans||x.word).toLowerCase());
}

function startQuiz(){
  setMode("quiz");
  const rev=getReviewWords(curDate),revNs=new Set(rev.map(w=>w.n)),todNs=new Set(dayWords.map(w=>w.n));
  const combined=[...dayWords,...rev.filter(w=>!todNs.has(w.n))];
  quizQueue=shuffle(combined);
  quizQueue.forEach(w=>{w._rev=revNs.has(w.n)&&!todNs.has(w.n);});
  quizIdx=0;qCorrect=0;qWrong=0;renderQuizQ();
}

function renderQuizQ(){
  if(quizIdx>=quizQueue.length){showSummary();return;}
  const w=quizQueue[quizIdx];qAnswered=false;
  updProgress(quizIdx+1,quizQueue.length);
  document.getElementById("wordRange").textContent=`Quiz ${quizIdx+1} / ${quizQueue.length}`;
  const rb=document.getElementById("reviewBadge");
  w._rev?rb.classList.remove("hidden"):rb.classList.add("hidden");
  document.getElementById("quizSentence").innerHTML=w.ex_en.replace(/___[a-z]*/g,'<span class="quiz-blank-slot">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>');
  document.getElementById("quizJa").textContent="";
  const ans=(w.ans||w.word).toLowerCase();
  const distractors=getDistractors(w,3);
  const choices=shuffle([ans,...distractors]);
  const grid=document.getElementById("choicesGrid");grid.innerHTML="";
  choices.forEach(c=>{
    const btn=document.createElement("button");btn.className="choice-btn";btn.textContent=c;
    btn.onclick=()=>answerQ(c,ans,w,btn);grid.appendChild(btn);
  });
  document.getElementById("quizResult").style.display="none";
  document.getElementById("quizResult").className="quiz-result";
  const qnb=document.getElementById("quizNextBtn");
  qnb.style.display="none";
  qnb.textContent=quizIdx===quizQueue.length-1?"Results →":"Next →";
  showView("quizCardView");
}

function answerQ(chosen,ans,word,clickedBtn){
  if(qAnswered)return;qAnswered=true;
  const ok=(chosen===ans);
  document.getElementById("choicesGrid").querySelectorAll(".choice-btn").forEach(b=>{
    b.disabled=true;if(b.textContent===ans)b.classList.add("show-correct");
  });
  if(!ok)clickedBtn.classList.add("wrong");else clickedBtn.classList.add("correct");
  const res=document.getElementById("quizResult");
  if(ok){res.className="quiz-result correct";res.textContent="正解 — "+word.word+" ("+word.meaning+")";qCorrect++;}
  else{res.className="quiz-result wrong";res.textContent="不正解。正解は「"+ans+"」— "+word.meaning;qWrong++;}
  recordResult(word.n,ok);
  document.getElementById("quizNextBtn").style.display="block";
}

function nextQuizQ(){quizIdx++;renderQuizQ();}

// ── Summary & History ──────────────────────────────
function renderHistChart(hist,chartId,listId){
  const chart=document.getElementById(chartId);
  const list=document.getElementById(listId);
  if(!hist.length){chart.innerHTML="";list.innerHTML="";return;}
  const recent=hist.slice(-14);
  chart.innerHTML=recent.map(h=>{
    const col=rateColor(h.rate),hpx=Math.round(48*h.rate/100),md=h.date.slice(5);
    return `<div class="hist-bar-wrap"><div class="hist-bar-pct">${h.rate}%</div><div class="hist-bar-bg"><div class="hist-bar-fill" style="height:${hpx}px;background:${col}"></div></div><div class="hist-bar-date">${md}</div></div>`;
  }).join("");
  list.innerHTML=[...hist].reverse().map(h=>{
    const col=rateColor(h.rate);
    return `<div class="hist-row"><span class="hist-row-date">${h.date}</span><span class="hist-row-day">Day ${h.day}</span><div class="hist-row-bar"><div class="hist-row-fill" style="width:${h.rate}%;background:${col}"></div></div><span class="hist-row-pct" style="color:${col}">${h.rate}%</span></div>`;
  }).join("");
}

function showSummary(){
  const tot=quizQueue.length,rate=tot>0?Math.round((qCorrect/tot)*100):0;
  document.getElementById("sumCorrect").textContent=qCorrect+" 問";
  document.getElementById("sumWrong").textContent=qWrong+" 問";
  const re=document.getElementById("sumRate");re.textContent=rate+"%";
  re.className="summary-val "+(rate>=80?"val-good":rate>=60?"val-warn":"val-bad");
  const srs=loadSRS();
  const weak=Object.entries(srs).filter(([,r])=>r.wrong>=2).sort(([,a],[,b])=>b.wrong-a.wrong).slice(0,5)
    .map(([n,r])=>{const w=ALL_WORDS.find(x=>x.n===parseInt(n));return w?{word:w.word,meaning:w.meaning,wrong:r.wrong}:null;}).filter(Boolean);
  const wl=document.getElementById("weakList");
  wl.innerHTML=weak.length>0?`<div class="weak-section-label">Weak Words</div>`+
    weak.map(w=>`<div class="weak-item"><span class="weak-word">${w.word}<span class="weak-meaning">${w.meaning}</span></span><span class="weak-cnt">${w.wrong}回</span></div>`).join(""):"";
  saveScore(curDate,dateToDay(curDate),qCorrect,tot,rate);
  renderHistChart(loadHist(),"histChart","histList");
  document.getElementById("histSection").style.display="block";
  document.getElementById("wordRange").textContent="Quiz Results";
  document.getElementById("counter").classList.add("hidden");
  showView("summaryView");
}

function showStats(){
  const hist=loadHist();
  renderHistChart(hist,"statsChart","statsList");
  const srs=loadSRS();
  const weak=Object.entries(srs).filter(([,r])=>r.wrong>=2).sort(([,a],[,b])=>b.wrong-a.wrong).slice(0,10)
    .map(([n,r])=>{const w=ALL_WORDS.find(x=>x.n===parseInt(n));return w?{word:w.word,meaning:w.meaning,wrong:r.wrong}:null;}).filter(Boolean);
  const sw=document.getElementById("statsWeak");
  sw.innerHTML=weak.length>0
    ?weak.map(w=>`<div class="weak-item"><span class="weak-word">${w.word}<span class="weak-meaning">${w.meaning}</span></span><span class="weak-cnt">${w.wrong}回</span></div>`).join("")
    :'<div style="font-size:12px;color:var(--text3);padding:8px 0">苦手な語はまだありません</div>';
  showView("statsView");
}

function showWordList(){
  const srs=loadSRS();
  // 学習済み単語（SRSに記録があるもの）＋ 全単語を苦手順に並べる
  const studied=ALL_WORDS.filter(w=>{
    const day=Math.ceil(w.n/PER_DAY);
    const st=(day-1)*PER_DAY+1;
    // 今日の日付までに学習対象になっているか
    const dayDate=new Date(START.getTime()+(day-1)*86400000).toISOString().split("T")[0];
    return dayDate<=curDate;
  });
  if(!studied.length){
    document.getElementById("wordListCount").textContent="まだ学習していません";
    document.getElementById("wordListItems").innerHTML=`<div class="wordlist-empty">日付を進めると<br>学習した単語が表示されます</div>`;
    showView("wordListView");return;
  }
  // 苦手順にソート: wrong数 降順 → wrong=0は最後（名詞の50音順）
  const sorted=[...studied].sort((a,b)=>{
    const ra=srs[a.n]||{wrong:0};const rb=srs[b.n]||{wrong:0};
    if(rb.wrong!==ra.wrong) return rb.wrong-ra.wrong;
    return a.word.localeCompare(b.word);
  });
  document.getElementById("wordListCount").textContent=sorted.length+"語";
  document.getElementById("wordListItems").innerHTML=sorted.map((w,i)=>{
    const rec=srs[w.n]||{wrong:0};
    let badge,bclass;
    if(rec.wrong>=3){badge=`${rec.wrong}回間違え`;bclass="badge-weak";}
    else if(rec.wrong>0){badge=`${rec.wrong}回間違え`;bclass="badge-weak";}
    else if(srs[w.n]){badge="習得";bclass="badge-ok";}
    else{badge="未テスト";bclass="badge-new";}
    return `<div class="wordlist-item" onclick="jumpToWord(${w.n})">
      <span class="wordlist-rank">${i+1}</span>
      <span class="wordlist-word">${w.word}</span>
      <span class="wordlist-meaning">${w.meaning}</span>
      <span class="wordlist-badge ${bclass}">${badge}</span>
    </div>`;
  }).join("");
  showView("wordListView");
}

function jumpToWord(n){
  const w=ALL_WORDS.find(x=>x.n===n);if(!w) return;
  const day=Math.ceil(w.n/PER_DAY);
  const st=(day-1)*PER_DAY+1,en=st+PER_DAY-1;
  dayWords=ALL_WORDS.filter(x=>x.n>=st&&x.n<=en);
  wordIdx=dayWords.findIndex(x=>x.n===n);
  if(wordIdx<0) wordIdx=0;
  renderWord();
}

function finishDay(){wordIdx=0;renderWord();}
function startStudy(){renderWord();}
function startQuizFromSelect(){startQuiz();}

function loadDay(s){
  curDate=s;const day=dateToDay(s),st=(day-1)*PER_DAY+1,en=st+PER_DAY-1;
  document.getElementById("dayBadge").textContent="Day "+day;
  document.getElementById("wordRange").textContent="No. "+st+" — "+Math.min(en,MAX_W);
  document.getElementById("counter").classList.add("hidden");
  document.getElementById("progressFill").style.width="0%";
  wordIdx=0;
  // カウントダウン計算
  const selected=new Date(s+"T00:00:00");
  const diffMs=EXAM_DATE-selected;
  const diffDays=Math.ceil(diffMs/86400000);
  const badge=document.getElementById("countdownBadge");
  const passed=document.getElementById("examPassedMsg");
  if(diffDays>0){
    badge.style.display="inline-flex";
    passed.style.display="none";
    document.getElementById("countdownNum").textContent=diffDays;
  } else if(diffDays===0){
    badge.style.display="inline-flex";
    passed.style.display="none";
    document.getElementById("countdownNum").textContent="0";
  } else {
    badge.style.display="none";
    passed.style.display="block";
  }
  if(st>MAX_W){showView("completeView");return;}
  dayWords=ALL_WORDS.filter(w=>w.n>=st&&w.n<=en);
  if(!dayWords.length){showView("noDataView");return;}
  const revCount=getReviewWords(s).filter(w=>!dayWords.find(d=>d.n===w.n)).length;
  document.getElementById("modeSelectTitle").textContent="Day "+day;
  document.getElementById("modeSelectSub").textContent=revCount>0?`今日の${PER_DAY}語 + 復習語 ${revCount}語`:`今日の${PER_DAY}語で学習・テスト`;
  setMode("study");showView("modeSelectView");
}

document.getElementById("dateInput").addEventListener("change",e=>loadDay(e.target.value));
loadDay("2026-04-20");
</script>
